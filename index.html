<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShowHub</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    
    <nav class="navbar">
      <a href="index.html" class="logo">Show<span>Hub</span></a>
      <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="pages/movies.html">Movies</a>
        <a href="pages/theaters.html">Theaters</a>
        <a href="pages/bookings.html">My Bookings</a>
        <a href="pages/admin.html">Admin</a>
      </div>
      <div class="nav-user" id="nav-user"></div>
    </nav>

    <!-- CITY BAR -->
    <div class="city-bar" id="city-bar">
      <span
        style="color: var(--text-muted); font-size: 0.85rem; font-weight: 600"
        >📍 City:</span
      >
    </div>

    <!-- HERO -->
    <section class="hero">
      <h1>Your <span>Entertainment</span> Starts Here</h1>
      <p>Book movie tickets for the latest shows in your city</p>
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Search for movies..."
          oninput="searchMovies()"
        />
        <button class="btn btn-primary" onclick="searchMovies()">Search</button>
      </div>
    </section>

    <!-- MOVIES SECTION -->
    <div class="container">
      <h2 class="section-title">Now Showing</h2>
      <div class="grid grid-4" id="movies-grid"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>


window.addEventListener("load", () => { 
  const params = new URLSearchParams(window.location.search);

    const email = params.get("email");
    const name = params.get("name");

    if (email && name) {

        const user = {
            email: email,
            name: name
        };

        setLoggedInUser(user);

        showToast(`Welcome ${name}! 🎉`, "success");

        // साफ URL (remove params)
        window.history.replaceState({}, document.title, "/index.html");
    } 
  const isFromBack = sessionStorage.getItem("cameFromBack");
  if (isFromBack === "true") {
    history.pushState(null, "", location.href);

    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    sessionStorage.removeItem("cameFromBack");
  }
});

      let allMovies = [];

      
async function loadCities() {
  try {
    const cities = await CityAPI.getAll();
    const bar = document.getElementById("city-bar");

    const savedCityId = sessionStorage.getItem("selectedCityId");

    let selectedCityId = savedCityId || 0; 

    cities.forEach((city) => {
      const chip = document.createElement("button");

      if (city.id == savedCityId) {
        chip.className = "city-chip active";
      // }else if(!savedCityId && city.id == 0){
      //   chip.className = "city-chip active";
      //   selectedCityId = 0;
      }
      else {
        chip.className = "city-chip";
      }

      chip.textContent = city.name;

      chip.onclick = () => {
        document
          .querySelectorAll(".city-chip")
          .forEach((c) => c.classList.remove("active"));

        chip.classList.add("active");

        sessionStorage.setItem("selectedCityId", city.id);

        showToast(`City: ${city.name}:` , "info");
        // console.log("Selected city ID:", city.id);
        loadMovies(city.id);
      };

      bar.appendChild(chip);
    });

    loadMovies(selectedCityId);

  } catch (e) {
    console.log("No cities loaded yet");
  }
}
     async function loadMovies(cityId) {
  showLoading("movies-grid");

  try {
    
    if (!cityId || cityId == 0) {
      allMovies = await MovieAPI.getAll();
      renderMovies(allMovies);
      return;
    }

    const theaters = await TheaterAPI.getByCity(cityId);

    const movieSet = new Set();
    
    for (const t of theaters) {

    const screens = await ScreenAPI.getByTheater(t.id);


      for (const s of screens) {
       
        const shows = await ShowAPI.getByScreenId(s.id);
console.log("Shows for screen", s.name, ":", shows);
        for (const sh of shows) {
          console.log("Found show:", sh.id, "Movie ID:", sh.movie.id);
          if (sh.movie.id) {
            movieSet.add(sh.movie.id);
          }
        }
      }
    }
    const movieIds = Array.from(movieSet);

    if (movieIds.length === 0) {
      renderMovies([]);
      return;
    }
    const movies = await Promise.all(
      movieIds.map((id) => MovieAPI.getById(id))
    );

    allMovies = movies.filter((m) => m != null);

    renderMovies(allMovies);

  } catch (e) {
    showEmpty(
      "movies-grid",
      "Could not load movies. Server might be down or you are offline."
    );
  }
}

      function renderMovies(movies) {
        const grid = document.getElementById("movies-grid");
        if (movies.length === 0) {
          showEmpty("movies-grid", "No movies found");
          return;
        }
        grid.innerHTML = movies
          .map(
            (m) => `
                <a href="pages/movie-detail.html?id=${m.id}" class="card">
                    <div class="card-img" style="display:flex;align-items:center;justify-content:center;font-size:4rem;background:linear-gradient(135deg, #1a1a2e, #16213e);">
                        <img src="${m.posterUrl || "assets/default-movie.png"}" alt="${m.title}" style="max-width:100%; max-height:100%; border-radius:4px;" />
                    </div>
                    <div class="card-body">
                        <h3>${m.title}</h3>
                        <p>${m.description || ""}</p>
                        <div style="margin-top:0.5rem; display:flex; gap:0.4rem; flex-wrap:wrap;">
                            ${m.genre ? `<span class="badge badge-genre">${m.genre}</span>` : ""}
                            ${m.language ? `<span class="badge badge-lang">${m.language}</span>` : ""}
                            ${m.rating ? `<span class="badge badge-rating">⭐ ${m.rating}</span>` : ""}
                        </div>
                    </div>
                    <div class="card-footer">
                        <span style="font-size:0.8rem;color:var(--text-muted);">${m.durationMinutes ? m.durationMinutes + " min" : ""}</span>
                        <span class="btn btn-sm btn-primary">Book Now</span>
                    </div>
                </a>
            `,
          )
          .join("");
      }

      function searchMovies() {
        const q = document
          .getElementById("search-input")
          .value.toLowerCase()
          .trim();
        if (!q) {
          renderMovies(allMovies);
          return;
        }
        const filtered = allMovies.filter(
          (m) =>
            m.title.toLowerCase().includes(q) ||
            (m.genre && m.genre.toLowerCase().includes(q)) ||
            (m.language && m.language.toLowerCase().includes(q)),
        );
        renderMovies(filtered);
      }

      loadCities();
      // loadMovies();
    </script>
  </body>
</html>
